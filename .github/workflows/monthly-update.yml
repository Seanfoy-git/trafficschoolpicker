name: Monthly DMV Scrape → Notion

on:
  schedule:
    - cron: "0 9 1 * *" # 9am UTC on 1st of every month
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape CA DMV → Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DIRECTORY_DB: ${{ secrets.NOTION_DIRECTORY_DB }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: npm run scrape:ca -- --deploy

      - name: Scrape TX TDLR → Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DIRECTORY_DB: ${{ secrets.NOTION_DIRECTORY_DB }}
        run: npm run scrape:tx

      - name: Scrape FL DHSMV → Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DIRECTORY_DB: ${{ secrets.NOTION_DIRECTORY_DB }}
        run: npm run scrape:fl

      - name: Summary
        run: echo "Scrape complete. Notion updated. Site will reflect changes via ISR within 24hrs or after deploy."
