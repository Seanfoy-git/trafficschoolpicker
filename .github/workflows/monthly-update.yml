name: Monthly Data Refresh

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of each month, 9am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_SCHOOLS_DB: ${{ secrets.NOTION_SCHOOLS_DB }}
      NOTION_DIRECTORY_DB: ${{ secrets.NOTION_DIRECTORY_DB }}
      NOTION_STATES_DB: ${{ secrets.NOTION_STATES_DB }}
      NOTION_PRICING_DB: ${{ secrets.NOTION_PRICING_DB }}
      NOTION_FAQ_DB_ID: ${{ secrets.NOTION_FAQ_DB_ID }}
      NOTION_STATE_REQUIREMENTS_DB: ${{ secrets.NOTION_STATE_REQUIREMENTS_DB }}
      NOTION_SCHOOL_VARIANTS_DB: ${{ secrets.NOTION_SCHOOL_VARIANTS_DB }}
      NOTION_ISSUES_DB: ${{ secrets.NOTION_ISSUES_DB }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Verify required secrets are set
        run: |
          missing=()
          for v in NOTION_TOKEN NOTION_SCHOOLS_DB NOTION_DIRECTORY_DB NOTION_PRICING_DB GOOGLE_PLACES_API_KEY; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape state DMV sources → Notion Directory
        run: npm run scrape:dmv

      - name: Scrape Trustpilot ratings → Notion Schools
        run: npm run scrape:reviews

      - name: Scrape school prices → Notion
        run: npm run scrape:prices

      - name: Enrich new schools via Google Places API
        run: npm run enrich:places

      - name: Trigger Vercel redeploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Vercel redeploy triggered"
          else
            echo "No deploy hook configured — skipping"
          fi
